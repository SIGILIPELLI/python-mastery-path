site_name: Python Mastery Path
site_description: A structured, module-wise Python training program from entry level to master level.
site_url: https://sigilipelli.github.io/python-mastery-path/
repo_url: https://github.com/sigilipelli/python-mastery-path
repo_name: python-mastery-path

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & First Program": level-1/01-setup.md
      - "02 · Variables, Data Types & Operators": level-1/02-variables-data-types.md
      - "03 · Control Flow": level-1/03-control-flow.md
      - "04 · Functions & Scope": level-1/04-functions-scope.md
      - "05 · Core Data Structures": level-1/05-data-structures.md
      - "06 · Strings & Formatting": level-1/06-strings-formatting.md
      - "07 · File I/O Basics": level-1/07-file-io.md
      - "08 · Error Handling Basics": level-1/08-error-handling.md
      - "09 · Modules, Packages & pip": level-1/09-modules-packages.md
      - "10 · Project — CLI To-Do App": level-1/10-project-todo-app.md
  - "Level 2 · Intermediate":
      - Overview: level-2/index.md
      - "01 · Object-Oriented Programming": level-2/01-oop.md
      - "02 · Comprehensions & Generators": level-2/02-comprehensions-generators.md
      - "03 · Functional Programming": level-2/03-functional-programming.md
      - "04 · Custom Exceptions & Context Managers": level-2/04-exceptions-context-managers.md
      - "05 · Data Formats (CSV/JSON/XML)": level-2/05-data-formats.md
